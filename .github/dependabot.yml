version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    groups:
      frontend-tooling:
        patterns:
          - "@vitejs/*"
          - "vite"
          - "vitest"
          - "typescript*"
          - "eslint*"
          - "cypress"
          - "start-server-and-test"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
